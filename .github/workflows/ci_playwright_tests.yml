name: Playwright Tests - KidProblem
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-playwright:
    environment: TEST_KIDPROBLEM

    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./kid-problem-ui-test-playwright

    steps:
    - uses: actions/checkout@v5

    - uses: actions/setup-node@v5
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test
      env:
        BASE_URL: ${{ vars.BASE_URL }}
        TEST_USER_USERNAME: ${{ secrets.TEST_USER_USERNAME }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        TEST_CHILD_USERNAME: ${{ secrets.TEST_CHILD_USERNAME }}
        TEST_CHILD_PASSWORD: ${{ secrets.TEST_CHILD_PASSWORD }}

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30